<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentGuard Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #141414;
      --border:   #2a2a2a;
      --accent:   #7c6bff;
      --text:     #e0e0e0;
      --muted:    #888;
      --critical: #ff4f4f;
      --high:     #ff8c42;
      --warn:     #ffd166;
      --green:    #06d6a0;
      --red:      #ff4f4f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .logo-shield { font-size: 20px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .clock { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; }

    /* ── daemon status pill ── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .pill.running { color: var(--green); }
    .pill.running .dot { background: var(--green); animation: pulse 2s ease-in-out infinite; }
    .pill.stopped { color: var(--red); }
    .pill.stopped .dot { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── main layout ── */
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── filters ── */
    .filters { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; }
    .filter-btn {
      background: var(--surface);
      color: var(--muted);
      border: none;
      border-right: 1px solid var(--border);
      padding: 8px 18px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { background: rgba(124,107,255,0.08); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #fff; font-weight: bold; }

    /* ── project group ── */
    .project-group { margin-bottom: 28px; }
    .project-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .project-name { font-size: 15px; font-weight: bold; color: var(--text); }
    .project-path { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-count { margin-left: auto; font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* ── session card ── */
    .session-card {
      display: grid;
      grid-template-columns: 1fr 130px 150px 90px;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .session-card:hover { background: rgba(124,107,255,0.07); border-color: var(--accent); }
    .session-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .session-start { color: var(--text); }
    .session-sub { color: var(--muted); font-size: 11px; }
    .session-id { color: var(--accent); }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .col-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .col-value { color: var(--text); }
    .col-value.sensitive { color: var(--warn); }
    .badge-cell { text-align: right; }

    .level-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.04em;
    }
    .level-CRITICAL { background: var(--critical); color: #fff; }
    .level-HIGH     { background: var(--high); color: #111; }
    .level-WARN     { background: var(--warn); color: #111; }
    .level-none     { color: var(--muted); font-size: 11px; }

    /* ── empty state ── */
    .empty-state { padding: 48px; text-align: center; color: var(--muted); }
    .empty-state .big { font-size: 32px; margin-bottom: 12px; }

    .refresh-label { color: var(--muted); font-size: 11px; }
    .refresh-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-shield">🛡</span>
    AgentGuard Dashboard
  </div>
  <div class="header-right">
    <span id="daemon-pill" class="pill"><span class="dot"></span><span id="daemon-text">checking…</span></span>
    <span class="refresh-label"><span class="refresh-dot"></span>auto-refresh 5s</span>
    <span class="clock" id="clock"></span>
  </div>
</header>

<main>
  <div class="filters" id="filters">
    <button class="filter-btn" data-range="today">Hoy</button>
    <button class="filter-btn active" data-range="7d">Últimos 7 días</button>
    <button class="filter-btn" data-range="30d">Últimos 30 días</button>
  </div>

  <div id="projects">
    <div class="empty-state"><div class="big">📋</div><p>Loading…</p></div>
  </div>
</main>

<script>
  let currentRange = "7d";

  // ── clock ──
  function updateClock() {
    document.getElementById("clock").textContent = new Date().toLocaleTimeString();
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── helpers ──
  function escHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function shortId(id) { return id ? id.slice(0, 8) : "—"; }

  // Local start timestamp, e.g. "May 28, 2:35:52 PM"
  function fmtStartLocal(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    if (isNaN(d)) return "—";
    return d.toLocaleString([], { month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  // Human-readable duration, e.g. "1h 23m"
  function fmtDuration(ms) {
    if (!ms || ms < 0) return "—";
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const days = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (days) return days + "d " + h + "h";
    if (h)    return h + "h " + m + "m";
    return m + "m";
  }

  function levelBadge(level) {
    return level
      ? `<span class="level-badge level-${level}">${level}</span>`
      : `<span class="level-none">—</span>`;
  }

  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.statusText);
    return res.json();
  }

  // ── render ──
  function renderDaemon(running) {
    const pill = document.getElementById("daemon-pill");
    const text = document.getElementById("daemon-text");
    pill.classList.remove("running", "stopped");
    pill.classList.add(running ? "running" : "stopped");
    text.textContent = running ? "daemon running" : "daemon stopped";
  }

  function renderProjects(projects) {
    const root = document.getElementById("projects");

    if (!projects || projects.length === 0) {
      root.innerHTML = `<div class="empty-state"><div class="big">📋</div>
        <p>No sessions in this range. Start the daemon or run <code>agentguard &lt;agent&gt;</code>.</p></div>`;
      return;
    }

    root.innerHTML = projects.map((g) => {
      const path = g.fullPath
        ? `<span class="project-path">${escHtml(g.fullPath)}</span>`
        : (g.project === "(command-line)"
            ? `<span class="project-path">interactive runs (no project path)</span>`
            : `<span class="project-path">not in watchPaths</span>`);

      const cards = g.sessions.map((s) => `
        <div class="session-card" data-session-id="${escHtml(s.sessionId)}">
          <div class="session-meta">
            <span class="session-start">${escHtml(fmtStartLocal(s.startTime))}</span>
            <span class="session-sub"><span class="session-id">${shortId(s.sessionId)}</span> · ${escHtml(s.agent || "—")}</span>
          </div>
          <div class="col">
            <span class="col-label">Duration</span>
            <span class="col-value">${fmtDuration(s.durationMs)}</span>
          </div>
          <div class="col">
            <span class="col-label">Sensitive events</span>
            <span class="col-value sensitive">${s.sensitiveCount}</span>
          </div>
          <div class="badge-cell">${levelBadge(s.maxLevel)}</div>
        </div>`).join("");

      return `<div class="project-group">
        <div class="project-head">
          <span class="project-name">${escHtml(g.project)}</span>
          ${path}
          <span class="project-count">${g.sessions.length} session${g.sessions.length === 1 ? "" : "s"}</span>
        </div>
        ${cards}
      </div>`;
    }).join("");

    // Click hook for the per-session timeline (TASK-008).
    for (const card of root.querySelectorAll(".session-card")) {
      card.addEventListener("click", () => {
        // Timeline view lands in TASK-008; affordance wired up now.
        console.log("open session", card.dataset.sessionId);
      });
    }
  }

  // ── filters ──
  document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    currentRange = btn.dataset.range;
    for (const b of document.querySelectorAll(".filter-btn")) {
      b.classList.toggle("active", b === btn);
    }
    refresh();
  });

  // ── polling ──
  async function refresh() {
    try {
      const [status, data] = await Promise.all([
        fetchJson("/api/daemon-status"),
        fetchJson("/api/sessions?range=" + currentRange),
      ]);
      renderDaemon(status.running);
      renderProjects(data.projects);
    } catch (err) {
      console.warn("Dashboard refresh failed:", err.message);
    }
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
