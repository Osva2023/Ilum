<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentGuard Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* OzForce Labs palette */
      --bg-primary:    #0a0f1a;
      --bg-secondary:  #0d1527;
      --bg-card:       #111827;
      --accent-cyan:   #00e5ff;
      --accent-blue:   #0066ff;
      --text-primary:  #ffffff;
      --text-secondary:#94a3b8;
      --border:        rgba(0, 229, 255, 0.12);
      --border-hover:  rgba(0, 229, 255, 0.3);

      /* alert levels (preserved) */
      --critical: #e74c3c;
      --high:     #e67e22;
      --warn:     #f39c12;

      /* status */
      --green: #2ecc71;
      --red:   #e74c3c;

      /* effects + fonts */
      --glow: 0 0 14px rgba(0, 229, 255, 0.22);
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, "Consolas", monospace;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { display: flex; align-items: baseline; gap: 9px; }
    .logo-shield { font-size: 20px; align-self: center; }
    .logo-text { font-size: 17px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.02em; }
    .logo-accent { color: var(--accent-cyan); }
    .logo-tag { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.04em; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .clock { color: var(--text-secondary); font-size: 12px; letter-spacing: 0.08em; font-family: var(--mono); }

    /* ── daemon status pill ── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(0, 229, 255, 0.05);
      border: 1px solid var(--border);
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); }
    .pill.running { color: var(--green); border-color: rgba(46, 204, 113, 0.3); }
    .pill.running .dot { background: var(--green); animation: pulse 2s ease-in-out infinite; }
    .pill.stopped { color: var(--red); border-color: rgba(231, 76, 60, 0.3); }
    .pill.stopped .dot { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── main layout ── */
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── filters ── */
    .filters { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; }
    .filter-btn {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: none;
      border-right: 1px solid var(--border);
      padding: 8px 18px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { background: rgba(0, 229, 255, 0.08); color: var(--text-primary); box-shadow: inset var(--glow); }
    .filter-btn.active { background: var(--accent-cyan); color: #0a0f1a; font-weight: 700; }

    /* ── toolbar (filters + project selector) ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .toolbar .filters { margin-bottom: 0; }
    .project-select-wrap { display: flex; align-items: center; gap: 10px; }
    .project-select-wrap label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }
    .project-select {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .project-select:hover { border-color: var(--border-hover); box-shadow: var(--glow); }
    .project-select:focus { outline: none; border-color: var(--accent-cyan); box-shadow: var(--glow); }

    /* ── project group ── */
    .project-group { margin-bottom: 28px; }
    .project-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .project-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .project-path { font-size: 11px; color: var(--text-secondary); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-count { margin-left: auto; font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }

    /* ── session card ── */
    .session-card {
      display: grid;
      grid-template-columns: 1fr 130px 150px 90px;
      align-items: center;
      gap: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .session-card:hover { background: var(--bg-card); border-color: var(--border-hover); box-shadow: var(--glow); }
    .session-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .session-start { color: var(--text-primary); }
    .session-sub { color: var(--text-secondary); font-size: 11px; }
    .session-id { color: var(--accent-cyan); font-family: var(--mono); }
    .col { display: flex; flex-direction: column; gap: 2px; }
    .col-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }
    .col-value { color: var(--text-primary); }
    .col-value.sensitive { color: var(--warn); }
    .badge-cell { text-align: right; }

    /* ── level badges (clean pill style) ── */
    .level-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }
    .level-CRITICAL { background: rgba(231, 76, 60, 0.15); color: var(--critical); border-color: rgba(231, 76, 60, 0.4); }
    .level-HIGH     { background: rgba(230, 126, 34, 0.15); color: var(--high); border-color: rgba(230, 126, 34, 0.4); }
    .level-WARN     { background: rgba(243, 156, 18, 0.15); color: var(--warn); border-color: rgba(243, 156, 18, 0.4); }
    .level-none     { color: var(--text-secondary); font-size: 11px; }

    /* ── session detail / timeline ── */
    .detail-head { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .back-btn {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .back-btn:hover { background: rgba(0, 229, 255, 0.08); border-color: var(--border-hover); box-shadow: var(--glow); }
    .detail-title { display: flex; flex-direction: column; gap: 2px; }
    .detail-title .main { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .detail-title .sub { color: var(--text-secondary); font-size: 11px; font-family: var(--mono); }

    .timeline {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .tl-header, .tl-row {
      display: grid;
      grid-template-columns: 92px 130px 1fr 90px 120px;
      gap: 12px;
      padding: 9px 16px;
      align-items: baseline;
    }
    .tl-header {
      color: var(--text-secondary);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    .tl-row { border-bottom: 1px solid var(--border); font-size: 12px; }
    .tl-row:last-child { border-bottom: none; }
    .tl-row:hover { background: rgba(0, 229, 255, 0.05); }
    .tl-time { color: var(--text-secondary); font-family: var(--mono); }
    .tl-type { color: var(--text-primary); }
    .tl-type.sensitive  { color: var(--accent-cyan); }
    .tl-type.correlation { color: var(--accent-blue); }
    .tl-detail { color: var(--text-secondary); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tl-action { font-size: 11px; }
    .tl-action.kept, .tl-action.approved { color: var(--green); }
    .tl-action.denied { color: var(--red); }
    .tl-action.rolled { color: var(--accent-cyan); }
    .tl-action.none { color: var(--text-secondary); }

    /* ── most touched sensitive files (TASK-010) ── */
    .top-files-section { margin-top: 36px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .top-files { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .tf-header, .tf-row {
      display: grid;
      grid-template-columns: 1fr 110px 110px 160px;
      gap: 12px;
      padding: 9px 16px;
      align-items: baseline;
    }
    .tf-header {
      color: var(--text-secondary);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    .tf-row { font-size: 12px; transition: background 0.15s; }
    /* zebra striping: odd rows = bg-secondary (container), even = bg-card */
    .tf-row:nth-child(2n) { background: var(--bg-card); }
    .tf-row:hover { background: rgba(0, 229, 255, 0.06); }
    .tf-file { color: var(--text-primary); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tf-count { color: var(--accent-cyan); font-weight: 700; }
    .tf-last { color: var(--text-secondary); }
    .tf-empty { padding: 20px; text-align: center; color: var(--text-secondary); }

    .hidden { display: none; }

    /* ── empty state ── */
    .empty-state { padding: 48px; text-align: center; color: var(--text-secondary); }
    .empty-state .big { font-size: 32px; margin-bottom: 12px; }
    .empty-state code { font-family: var(--mono); color: var(--accent-cyan); }

    .refresh-label { color: var(--text-secondary); font-size: 11px; }
    .refresh-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-cyan); display: inline-block; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }

    /* ── footer ── */
    footer {
      text-align: center;
      padding: 24px;
      margin-top: 40px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 11px;
      letter-spacing: 0.03em;
    }
    footer a { color: var(--accent-cyan); text-decoration: none; transition: text-shadow 0.15s; }
    footer a:hover { text-shadow: var(--glow); text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-shield">🛡</span>
    <span class="logo-text">Agent<span class="logo-accent">Guard</span></span>
    <span class="logo-tag">by OzForce Labs</span>
  </div>
  <div class="header-right">
    <span id="daemon-pill" class="pill"><span class="dot"></span><span id="daemon-text">checking…</span></span>
    <span class="refresh-label"><span class="refresh-dot"></span>auto-refresh 5s</span>
    <span class="clock" id="clock"></span>
  </div>
</header>

<main>
  <!-- List view -->
  <div id="list-view">
    <div class="toolbar">
      <div class="filters" id="filters">
        <button class="filter-btn" data-range="today">Hoy</button>
        <button class="filter-btn active" data-range="7d">Últimos 7 días</button>
        <button class="filter-btn" data-range="30d">Últimos 30 días</button>
      </div>
      <div class="project-select-wrap">
        <label for="project-select">Project</label>
        <select id="project-select" class="project-select">
          <option value="all">All projects</option>
        </select>
      </div>
    </div>

    <div id="projects">
      <div class="empty-state"><div class="big">📋</div><p>Loading…</p></div>
    </div>

    <!-- Most touched sensitive files (TASK-010) -->
    <div class="top-files-section">
      <div class="section-title">Most touched sensitive files</div>
      <div class="top-files" id="top-files">
        <div class="tf-empty">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Detail / timeline view -->
  <div id="detail-view" class="hidden">
    <div class="detail-head">
      <button class="back-btn" id="back-btn">← Back</button>
      <div class="detail-title">
        <span class="main" id="detail-main">Session</span>
        <span class="sub" id="detail-sub"></span>
      </div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>
</main>

<footer>
  AgentGuard by OzForce Labs · <a href="https://github.com/Osva2023/AgentGuard" target="_blank" rel="noopener">github.com/Osva2023/AgentGuard</a>
</footer>

<script>
  let currentRange = "7d";
  let selectedProject = "all";   // project filter; "all" shows every project
  let lastGroups = [];           // most recent /api/sessions project groups

  // ── clock ──
  function updateClock() {
    document.getElementById("clock").textContent = new Date().toLocaleTimeString();
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── helpers ──
  function escHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function shortId(id) { return id ? id.slice(0, 8) : "—"; }

  // Local start timestamp, e.g. "May 28, 2:35:52 PM"
  function fmtStartLocal(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    if (isNaN(d)) return "—";
    return d.toLocaleString([], { month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  // Human-readable duration, e.g. "1h 23m"
  function fmtDuration(ms) {
    if (!ms || ms < 0) return "—";
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const days = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (days) return days + "d " + h + "h";
    if (h)    return h + "h " + m + "m";
    return m + "m";
  }

  function levelBadge(level) {
    return level
      ? `<span class="level-badge level-${level}">${level}</span>`
      : `<span class="level-none">—</span>`;
  }

  // Local time-of-day, HH:MM:SS
  function fmtClock(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    if (isNaN(d)) return "—";
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
  }

  // Event → human category, with a CSS class for color.
  function eventType(e) {
    if (e.source === "filewatch") return { label: "Sensitive file", cls: "sensitive" };
    if (e.source === "correlation") return { label: "Correlation", cls: "correlation" };
    if (e.source === "command" || (e.event || "").startsWith("command_")) return { label: "Command", cls: "" };
    if (e.event === "session_start" || e.event === "session_end") return { label: "Session", cls: "" };
    if (e.event === "snapshot_created" || e.event === "snapshot_restore") return { label: "Snapshot", cls: "" };
    if (e.event === "review_kept") return { label: "Sensitive file", cls: "sensitive" };
    if (e.event === "file_restore" || e.event === "telegram_keep") return { label: "Sensitive file", cls: "sensitive" };
    return { label: e.event || "event", cls: "" };
  }

  // What the file/command column should show.
  function eventDetail(e) {
    if (e.file) return e.file;
    if (e.command) return e.command;
    if (e.stashRef) return e.stashRef;
    if (e.event === "session_start") return "session started" + (e.agent ? " · " + e.agent : "");
    if (e.event === "session_end") return "session ended";
    if (e.reason) return e.reason;       // correlation events have no file/command
    if (e.message) return e.message;
    return "";
  }

  // Keep / Rollback / Approved / Denied / none.
  function eventAction(e) {
    const by = e.by ? " by @" + e.by : "";
    switch (e.event) {
      case "review_kept":
      case "telegram_keep":      return { label: "Kept" + by, cls: "kept" };
      case "incident_approved":
      case "command_approved":   return { label: "Approved", cls: "approved" };
      case "incident_denied":
      case "command_denied":     return { label: "Denied", cls: "denied" };
      case "file_restore":       return { label: (e.restored ? "Rolled back" : "Rollback failed") + by, cls: "rolled" };
      case "snapshot_restore":   return { label: e.restored ? "Rolled back" : "Rollback failed", cls: "rolled" };
      default:                   return { label: "—", cls: "none" };
    }
  }

  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.statusText);
    return res.json();
  }

  // ── render ──
  function renderDaemon(running) {
    const pill = document.getElementById("daemon-pill");
    const text = document.getElementById("daemon-text");
    pill.classList.remove("running", "stopped");
    pill.classList.add(running ? "running" : "stopped");
    text.textContent = running ? "daemon running" : "daemon stopped";
  }

  function renderProjects(projects) {
    const root = document.getElementById("projects");

    if (!projects || projects.length === 0) {
      root.innerHTML = `<div class="empty-state"><div class="big">📋</div>
        <p>No sessions in this range. Start the daemon or run <code>agentguard &lt;agent&gt;</code>.</p></div>`;
      return;
    }

    root.innerHTML = projects.map((g) => {
      const path = g.fullPath
        ? `<span class="project-path">${escHtml(g.fullPath)}</span>`
        : (g.project === "(command-line)"
            ? `<span class="project-path">interactive runs (no project path)</span>`
            : `<span class="project-path">not in watchPaths</span>`);

      const cards = g.sessions.map((s) => `
        <div class="session-card" data-session-id="${escHtml(s.sessionId)}">
          <div class="session-meta">
            <span class="session-start">${escHtml(fmtStartLocal(s.startTime))}</span>
            <span class="session-sub"><span class="session-id">${shortId(s.sessionId)}</span> · ${escHtml(s.agent || "—")}</span>
          </div>
          <div class="col">
            <span class="col-label">Duration</span>
            <span class="col-value">${fmtDuration(s.durationMs)}</span>
          </div>
          <div class="col">
            <span class="col-label">Sensitive events</span>
            <span class="col-value sensitive">${s.sensitiveCount}</span>
          </div>
          <div class="badge-cell">${levelBadge(s.maxLevel)}</div>
        </div>`).join("");

      return `<div class="project-group">
        <div class="project-head">
          <span class="project-name">${escHtml(g.project)}</span>
          ${path}
          <span class="project-count">${g.sessions.length} session${g.sessions.length === 1 ? "" : "s"}</span>
        </div>
        ${cards}
      </div>`;
    }).join("");

    // Open the per-session timeline (TASK-008).
    for (const card of root.querySelectorAll(".session-card")) {
      card.addEventListener("click", () => openSession(card.dataset.sessionId));
    }
  }

  // ── most touched sensitive files (TASK-010) ──
  function renderTopFiles(files) {
    const root = document.getElementById("top-files");
    if (!files || files.length === 0) {
      root.innerHTML = `<div class="tf-empty">(none in this period)</div>`;
      return;
    }
    const header = `<div class="tf-header">
      <span>File</span><span>Touched</span><span>Max level</span><span>Last seen</span>
    </div>`;
    const rows = files.map((f) => `
      <div class="tf-row">
        <span class="tf-file" title="${escHtml(f.file)}">${escHtml(f.file)}</span>
        <span class="tf-count">${f.count}</span>
        <span>${levelBadge(f.maxLevel)}</span>
        <span class="tf-last">${escHtml(fmtStartLocal(f.lastSeen))}</span>
      </div>`).join("");
    root.innerHTML = header + rows;
  }

  // ── session detail / timeline ──
  let openSessionId = null;

  function showListView() {
    openSessionId = null;
    document.getElementById("detail-view").classList.add("hidden");
    document.getElementById("list-view").classList.remove("hidden");
    refresh();
  }

  async function openSession(id) {
    if (!id) return;
    openSessionId = id;
    document.getElementById("list-view").classList.add("hidden");
    document.getElementById("detail-view").classList.remove("hidden");
    await renderTimeline(id);
  }

  async function renderTimeline(id) {
    const timeline = document.getElementById("timeline");
    let session;
    try {
      session = await fetchJson("/api/sessions/" + id);
    } catch (err) {
      timeline.innerHTML = `<div class="empty-state">Failed to load session: ${escHtml(err.message)}</div>`;
      return;
    }

    document.getElementById("detail-main").textContent =
      "Session " + shortId(id) + " · " + (session.agent || "—");
    document.getElementById("detail-sub").textContent =
      "Started " + fmtStartLocal(session.startTime) +
      "  ·  " + (session.events ? session.events.length : 0) + " events";

    const events = (session.events || [])
      .slice()
      .sort((a, b) => new Date(a.ts || 0) - new Date(b.ts || 0));

    if (events.length === 0) {
      timeline.innerHTML = `<div class="empty-state">No events recorded for this session.</div>`;
      return;
    }

    const header = `<div class="tl-header">
      <span>Time</span><span>Type</span><span>File / command</span>
      <span>Level</span><span>Action</span>
    </div>`;

    const rows = events.map((e) => {
      const type = eventType(e);
      const action = eventAction(e);
      return `<div class="tl-row">
        <span class="tl-time">${fmtClock(e.ts)}</span>
        <span class="tl-type ${type.cls}">${escHtml(type.label)}</span>
        <span class="tl-detail" title="${escHtml(eventDetail(e))}">${escHtml(eventDetail(e)) || "—"}</span>
        <span>${levelBadge(e.level)}</span>
        <span class="tl-action ${action.cls}">${escHtml(action.label)}</span>
      </div>`;
    }).join("");

    timeline.innerHTML = header + rows;
  }

  document.getElementById("back-btn").addEventListener("click", showListView);

  // ── filters ──
  document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    currentRange = btn.dataset.range;
    for (const b of document.querySelectorAll(".filter-btn")) {
      b.classList.toggle("active", b === btn);
    }
    refresh();
  });

  // ── project selector (TASK-009) ──
  // Render the cached project groups, narrowed to the selected project.
  function renderFiltered() {
    const groups = selectedProject === "all"
      ? lastGroups
      : lastGroups.filter((g) => g.project === selectedProject);
    renderProjects(groups);
  }

  // Rebuild the <select> options from /api/projects, preserving the current
  // selection.  Skips the DOM rewrite when the option set is unchanged so the
  // 5s poll never clobbers an open dropdown.
  async function populateProjects() {
    const sel = document.getElementById("project-select");
    let data;
    try { data = await fetchJson("/api/projects"); } catch { return; }
    const projects = data.projects || [];
    const wanted = ["all", ...projects.map((p) => p.project)];
    const current = Array.from(sel.options).map((o) => o.value);
    if (current.join("␀") === wanted.join("␀")) return;
    sel.innerHTML = `<option value="all">All projects</option>` +
      projects.map((p) => `<option value="${escHtml(p.project)}">${escHtml(p.project)}</option>`).join("");
    // Restore the prior selection if it still exists; otherwise reset to all.
    if (wanted.includes(selectedProject)) {
      sel.value = selectedProject;
    } else {
      selectedProject = "all";
      sel.value = "all";
    }
  }

  document.getElementById("project-select").addEventListener("change", (e) => {
    selectedProject = e.target.value;
    renderFiltered();
  });

  // ── polling ──
  async function refresh() {
    try {
      const status = await fetchJson("/api/daemon-status");
      renderDaemon(status.running);
    } catch (err) {
      console.warn("Daemon status refresh failed:", err.message);
    }
    // While viewing a session, keep its timeline fresh; otherwise refresh the list.
    if (openSessionId) {
      renderTimeline(openSessionId).catch(() => {});
      return;
    }
    await populateProjects();
    try {
      const data = await fetchJson("/api/sessions?range=" + currentRange);
      lastGroups = data.projects || [];
      renderFiltered();
    } catch (err) {
      console.warn("Dashboard refresh failed:", err.message);
    }
    try {
      const tf = await fetchJson("/api/top-files?range=" + currentRange);
      renderTopFiles(tf.files);
    } catch (err) {
      console.warn("Top files refresh failed:", err.message);
    }
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
